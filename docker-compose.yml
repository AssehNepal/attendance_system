services:
  common:
    env_file:
      - .env
    container_name: census_backend
    restart: always
    build: .
    ports:
      - '$PORT:$PORT'
    links:
      - postgres
  postgres:
    image: postgres:15
    container_name: census_postgres
    restart: always
    environment:
      DB_DATABASE: '${DB_DATABASE}'
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: census@123
      TZ: 'GMT'
      PGTZ: 'GMT'
    ports:
      - '5433:5432'
    expose:
      - '5433'
    env_file:
      - .env
    volumes:
      - census_auth_postgres_data:/var/lib/postgresql/data

  pgadmin:
    container_name: census_pgadmin
    image: dpage/pgadmin4
    ports:
      - '8081:80'
    volumes:
      - ~/census-pgladmin-data:/var/lib/pgadmin
    env_file:
      - .env
    links:
      - postgres

  redis-server:
    image: redis:alpine
    container_name: census_redis
    ports:
      - '6380:6379'
    volumes:
      - ~/census-redis-service/config/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    command: ['redis-server', '/usr/local/etc/redis/redis.conf', '--appendonly', 'yes']

volumes:
  census_auth_postgres_data:
    driver: local
  redis_data:
    driver: local
