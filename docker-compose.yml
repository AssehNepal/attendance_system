networks:
  attendance_network:
    driver: bridge

services:
  app:
    container_name: attendance_backend
    restart: always
    build: .
    env_file:
      - .env
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    depends_on:
      redis:
        condition: service_started
    networks:
      - attendance_network

  # Uncomment below if using local PostgreSQL instead of Neon DB
  # postgres:
